<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Cipher Quest - Identity V style decoding experience">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cipher_quest">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Cipher Quest</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Kill long-press artifacts on touch devices:
       - text selection / translate popup
       - iOS callout menu
       - tap highlight flash
       - image drag ghost */
    html, body {
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overscroll-behavior: none;
      background: #060608;
      margin: 0;
      overflow: hidden;
    }
    img { -webkit-user-drag: none; user-drag: none; }
  </style>
</head>
<body>
  <script>
    // Block browser context menu (right-click / touch long-press "translate, copy..." popup)
    window.addEventListener('contextmenu', function (e) { e.preventDefault(); }, { capture: true });
    // Block text-selection start (belt & suspenders for Android Chrome long-press)
    window.addEventListener('selectstart', function (e) { e.preventDefault(); }, { capture: true });
    // Block double-tap zoom / pinch gestures interfering with hold-to-decode
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    document.addEventListener('dblclick', function (e) { e.preventDefault(); }, { capture: true });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
