<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cipher Quest - Midnight Chase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <!-- 3D canvas -->
  <div id="canvas-wrap"><canvas id="gl"></canvas></div>

  <!-- ============ overlays ============ -->

  <!-- name entry -->
  <div class="overlay" id="ov-name">
    <div class="title">MIDNIGHT CHASE</div>
    <div class="subtitle">&#12295; 荘園の追跡劇 &#12295;</div>
    <div class="panel">
      <p class="wait-msg">プレイヤー名を入力して荘園に入場</p>
      <input id="name-input" type="text" maxlength="12" placeholder="名前 (12文字まで)" autocomplete="off">
      <button class="btn" id="btn-join">入場する</button>
    </div>
    <a class="back-link" href="/">&#8617; 暗号機画面へ戻る</a>
  </div>

  <!-- lobby -->
  <div class="overlay hidden" id="ov-lobby">
    <div class="title">LOBBY</div>
    <div class="subtitle">サバイバー待機中</div>
    <div class="panel">
      <div class="roster" id="roster"></div>
      <div class="countdown" id="lobby-countdown" style="display:none">15</div>
      <p class="wait-msg" id="lobby-msg">他のプレイヤーを待機中…</p>
      <div class="spinner"></div>
    </div>
    <a class="back-link" href="/">&#8617; 退出する</a>
  </div>

  <!-- wait (match in progress) -->
  <div class="overlay hidden" id="ov-wait">
    <div class="title">STAND BY</div>
    <div class="subtitle">試合進行中 — 途中参加はできません</div>
    <div class="panel">
      <div class="spinner"></div>
      <p class="wait-msg" id="wait-msg">現在試合が進行中です。終了までお待ちください。</p>
      <p class="wait-msg" style="opacity:.5;font-size:12px">試合終了後、自動的にロビーへ案内されます</p>
    </div>
    <a class="back-link" href="/">&#8617; 退出する</a>
  </div>

  <!-- result -->
  <div class="overlay hidden" id="ov-result">
    <div class="result-outcome" id="result-outcome"></div>
    <div class="panel">
      <table class="result-table"><tbody id="result-body"></tbody></table>
      <p class="wait-msg" id="result-ciphers"></p>
      <p class="wait-msg" style="opacity:.5;font-size:12px">まもなくロビーへ戻ります…</p>
    </div>
  </div>

  <!-- ============ in-game HUD ============ -->
  <div id="hud">
    <div class="hud-top">
      <div class="hud-timer" id="hud-timer">5:00</div>
      <div class="hud-ciphers" id="hud-ciphers">
        <div class="cipher-dot"></div><div class="cipher-dot"></div>
        <div class="cipher-dot"></div><div class="cipher-dot"></div>
        <div class="cipher-dot"></div>
      </div>
      <div class="hud-hp" id="hud-hp">
        <div class="hp-pip"></div><div class="hp-pip"></div><div class="hp-pip"></div>
      </div>
    </div>

    <div id="decode-hint" style="display:none">長押し / SPACE で解読</div>
    <div id="gate-hint" style="display:none">ゲートが開いた — 端まで走れ!</div>
    <div id="state-banner" style="display:none"></div>

    <div id="decode-bar-wrap" style="display:none"><div id="decode-bar"></div></div>
    <div id="event-feed"></div>
    <div id="danger-vignette"></div>

    <!-- touch controls (shown via body.touch) -->
    <div id="joystick"><div id="joy-knob"></div></div>
    <div id="btn-decode">解読</div>
  </div>

  <!-- scripts -->
  <script src="js/vendor/three.min.js"></script>
  <script src="js/net.js"></script>
  <script src="js/input.js"></script>
  <script src="js/world3d.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/main.js"></script>
  <script>
    // block long-press context menu / selection (same as decoder page)
    addEventListener('contextmenu', e => e.preventDefault(), { capture: true });
    addEventListener('selectstart', e => e.preventDefault(), { capture: true });
    document.addEventListener('dblclick', e => e.preventDefault(), { capture: true });
  </script>
</body>
</html>
